name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  RELEASE_CHANNEL: stable
  WORKWISE_DOWNLOAD_URL: https://www.railwise.cn/products/workwise/
  WORKWISE_PUBLIC_BASE_URL: https://www.railwise.cn/downloads
  WORKWISE_RELEASE_PREFIX: workwise

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      existing_tag: ${{ steps.version.outputs.existing_tag }}
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Compute release version from tag
        id: version
        run: node ./scripts/compute-ci-release-version.cjs --no-fetch

  stability:
    name: Two-hour pre-release stability
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 130
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:stability
        env:
          WORKWISE_STABILITY_MINUTES: '120'
          WORKWISE_STABILITY_INTERVAL_MINUTES: '10'

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [prepare, stability]
    env:
      WORKWISE_APP_VERSION: ${{ needs.prepare.outputs.version }}
      WORKWISE_UPDATE_CHANNEL: stable
      RELEASE_CHANNEL: stable
      # Mapped to env so steps can branch on presence (secrets are not allowed
      # in step-level `if:` conditions). When the signing secrets are absent the
      # job builds an unsigned package instead of failing.
      MAC_CODESIGN_P12_BASE64: ${{ secrets.MAC_CODESIGN_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve signing mode
        id: signing
        run: |
          set -euo pipefail
          if [[ -n "${MAC_CODESIGN_P12_BASE64:-}" \
                && -n "${CSC_KEY_PASSWORD:-}" \
                && -n "${APPLE_API_KEY_BASE64:-}" \
                && -n "${APPLE_API_KEY_ID:-}" \
                && -n "${APPLE_API_ISSUER:-}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Apple signing credentials present: building a signed, notarized package."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Apple signing secrets are not configured; building an UNSIGNED macOS package. Users must clear the quarantine attribute (see scripts/mac-unquarantine.sh)."
          fi

      - name: Decode Apple signing credentials
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          cert_path="${RUNNER_TEMP}/developer-id.p12"
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          export CERT_PATH="${cert_path}"
          export KEY_PATH="${key_path}"

          node <<'NODE'
          const fs = require('node:fs')
          fs.writeFileSync(process.env.CERT_PATH, Buffer.from(process.env.MAC_CODESIGN_P12_BASE64, 'base64'))
          fs.writeFileSync(process.env.KEY_PATH, Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))
          NODE

          {
            echo "CSC_LINK=${cert_path}"
            echo "APPLE_API_KEY=${key_path}"
            echo "MAC_SIGN=1"
          } >> "${GITHUB_ENV}"

      - name: Verify Apple signing credentials
        if: steps.signing.outputs.enabled == 'true'
        run: >
          npm run verify:apple -- --p12 "${CSC_LINK}"
          --p12-password "${CSC_KEY_PASSWORD}"
          --p8 "${APPLE_API_KEY}"
          --key-id "${APPLE_API_KEY_ID}"
          --issuer "${APPLE_API_ISSUER}"
          --check-notary

      - name: Build signed macOS packages
        if: steps.signing.outputs.enabled == 'true'
        run: npm run dist:mac:signed

      - name: Build unsigned macOS packages
        if: steps.signing.outputs.enabled != 'true'
        run: npm run dist:mac

      - name: Generate macOS update metadata
        run: node ./scripts/generate-mac-latest.cjs dist

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/WorkWise-*-mac-*.dmg
            dist/latest-mac.yml

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [prepare, stability]
    env:
      WORKWISE_APP_VERSION: ${{ needs.prepare.outputs.version }}
      WORKWISE_UPDATE_CHANNEL: stable
      RELEASE_CHANNEL: stable
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/WorkWise-*-win-x64.exe
            dist/WorkWise-*-win-x64.exe.blockmap
            dist/latest.yml

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
      RELEASE_CHANNEL: stable
      WORKWISE_UPDATE_CHANNEL: stable
      MAC_SIGNED: ${{ secrets.MAC_CODESIGN_P12_BASE64 != '' && secrets.APPLE_API_KEY_BASE64 != '' }}
    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Prepare public installer names
        run: |
          set -euo pipefail
          rm -rf public-release-assets
          mkdir -p public-release-assets

          copy_one() {
            local pattern="$1"
            local target="$2"
            mapfile -t matches < <(compgen -G "release-artifacts/${pattern}" || true)
            if [[ "${#matches[@]}" -ne 1 ]]; then
              echo "::error::Expected exactly one artifact matching ${pattern}, found ${#matches[@]}"
              find release-artifacts -maxdepth 2 -type f -print | sort
              exit 1
            fi
            cp "${matches[0]}" "public-release-assets/${target}"
          }

          copy_one "WorkWise-*-mac-arm64.dmg" "WorkWise-${RELEASE_VERSION}-mac-Apple-Silicon.dmg"
          copy_one "WorkWise-*-mac-x64.dmg" "WorkWise-${RELEASE_VERSION}-mac-Intel.dmg"
          copy_one "WorkWise-*-win-x64.exe" "WorkWise-${RELEASE_VERSION}-win-x64.exe"

          find public-release-assets -maxdepth 1 -type f -print | sort

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          required=(
            "WorkWise-${RELEASE_VERSION}-mac-Apple-Silicon.dmg"
            "WorkWise-${RELEASE_VERSION}-mac-Intel.dmg"
            "WorkWise-${RELEASE_VERSION}-win-x64.exe"
          )

          for file in "${required[@]}"; do
            if [[ ! -s "public-release-assets/${file}" ]]; then
              echo "::error::Missing release artifact ${file}"
              find public-release-assets -maxdepth 1 -type f -print | sort
              exit 1
            fi
          done

          find public-release-assets -maxdepth 1 -type f -print | sort

      - name: Prepare website update channel assets
        run: |
          set -euo pipefail
          node ./scripts/prepare-website-release-assets.cjs \
            release-artifacts \
            website-release-assets \
            "${RELEASE_VERSION}"

          node ./scripts/verify-release-assets.cjs website-release-assets --write-sha256 SHA256SUMS.txt

      - name: Upload website update channel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-website
          if-no-files-found: error
          retention-days: 7
          path: |
            website-release-assets/*

      - name: Generate release notes
        run: |
          set -euo pipefail
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            node ./scripts/generate-release-notes.cjs "${PREVIOUS_TAG}" > release-notes.md
          else
            node ./scripts/generate-release-notes.cjs > release-notes.md
          fi

          if [[ "${MAC_SIGNED}" == "true" ]]; then
            mac_line="- macOS: Developer ID signed and notarized"
          else
            mac_line="- macOS: UNSIGNED build — run \`xattr -dr com.apple.quarantine /Applications/WorkWise.app\` (or scripts/mac-unquarantine.sh) before first launch"
          fi

          {
            echo
            echo "---"
            echo
            echo "### 构建信息"
            echo
            echo "- Release version: \`${RELEASE_VERSION}\`"
            echo "- Release channel: \`${RELEASE_CHANNEL}\`"
            echo "- Tag: \`${TAG_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "${mac_line}"
            echo "- macOS Apple Silicon: \`WorkWise-${RELEASE_VERSION}-mac-Apple-Silicon.dmg\`"
            echo "- macOS Intel: \`WorkWise-${RELEASE_VERSION}-mac-Intel.dmg\`"
            echo "- Windows x64: \`WorkWise-${RELEASE_VERSION}-win-x64.exe\`"
          } >> release-notes.md

      - name: Create or update draft GitHub Release
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${TAG_NAME}" \
              --draft \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --verify-tag
          fi

      - name: Upload GitHub Release assets
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(
            find public-release-assets -type f \
              \( -name 'WorkWise-*-mac-Apple-Silicon.dmg' -o -name 'WorkWise-*-mac-Intel.dmg' -o -name 'WorkWise-*-win-x64.exe' \) \
              -print0
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber

      - name: Verify GitHub Release downloads
        run: |
          set -euo pipefail
          mkdir downloaded-release
          gh release download "${TAG_NAME}" \
            --dir downloaded-release \
            --pattern 'WorkWise-*-mac-Apple-Silicon.dmg' \
            --pattern 'WorkWise-*-mac-Intel.dmg' \
            --pattern 'WorkWise-*-win-x64.exe' \
            --clobber
          required=(
            "WorkWise-${RELEASE_VERSION}-mac-Apple-Silicon.dmg"
            "WorkWise-${RELEASE_VERSION}-mac-Intel.dmg"
            "WorkWise-${RELEASE_VERSION}-win-x64.exe"
          )
          for file in "${required[@]}"; do
            test -s "downloaded-release/${file}" || {
              echo "::error::Missing downloaded release asset ${file}"
              find downloaded-release -maxdepth 1 -type f -print | sort
              exit 1
            }
          done

      - name: Publish GitHub Release
        run: gh release edit "${TAG_NAME}" --draft=false --prerelease=false --latest
