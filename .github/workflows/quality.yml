name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: OpenSpec, brand, lint, type, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22.22.0'
          cache: npm
      - run: npm ci
      - run: npm run openspec:validate
      - run: npm run verify:brand-boundary
      - run: npm run verify:document-licenses
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm --prefix kun run typecheck
      - run: npm --prefix kun test
      - run: npm run build

  windows-security:
    name: Windows path, spawn, persistence
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22.22.0'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run src/main/services/canonical-containment.test.ts src/main/services/safe-spawn.test.ts src/main/services/durable-file.test.ts src/main/services/git-service.test.ts src/main/services/workspace-trust-service.test.ts src/main/services/mcp-config-service.test.ts src/main/services/git-checkpoint-service.test.ts src/main/services/repo-map-service.test.ts src/main/services/mineru-installer-service.test.ts src/main/services/document-engine-service.test.ts src/main/services/pdf-document-service.test.ts src/main/services/office-archive-security.test.ts src/main/services/workspace-preview-service.test.ts src/main/ipc/agent-workbench-api-contract.test.ts
      - run: npm --prefix kun test -- --run tests/atomic-write.test.ts tests/builtin-tools.test.ts src/services/task-run-repository.test.ts src/services/task-controller.test.ts src/services/runtime-span-service.test.ts src/loop/task-run-recovery.test.ts

  electron-smoke:
    name: Electron production smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22.22.0'
          cache: npm
      - run: npm ci
      - name: Prepare checksummed Electron runtime
        run: npm run prepare:electron
      - run: npm run build
      - name: Launch packaged production preview
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          set +e
          xvfb-run -a timeout --signal=INT 30s npm run preview
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then exit "$status"; fi
