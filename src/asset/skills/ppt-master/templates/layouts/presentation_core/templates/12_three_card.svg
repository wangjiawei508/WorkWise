<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="presentation_core_master" data-pptx-master-name="Presentation Core"
  data-pptx-layout="three_card" data-pptx-layout-name="Three-Card Synthesis">
  <rect id="master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="three-card-panel-one" x="64" y="168" width="368" height="472" rx="16" fill="#F4F6F8"
    stroke="#D6DCE3" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="three-card-panel-two" x="456" y="168" width="368" height="472" rx="16" fill="#F4F6F8"
    stroke="#D6DCE3" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="three-card-panel-three" x="848" y="168" width="368" height="472" rx="16" fill="#F4F6F8"
    stroke="#D6DCE3" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="three-card-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="64 48 1152 80">
    <text id="three-card-title-carrier" data-pptx-carrier="true"
      x="64" y="102" fill="#1E293B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="36" font-weight="700">{{PAGE_TITLE}}</text>
  </g>
  <g id="three-card-one-slot" data-pptx-placeholder="object" data-pptx-idx="1"
    data-pptx-bounds="88 192 320 424">
    <text id="three-card-one-carrier" data-pptx-carrier="true"
      x="88" y="230" fill="#64748B"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="22">{{CARD_1}}</text>
  </g>
  <g id="three-card-two-slot" data-pptx-placeholder="object" data-pptx-idx="2"
    data-pptx-bounds="480 192 320 424">
    <text id="three-card-two-carrier" data-pptx-carrier="true"
      x="480" y="230" fill="#64748B"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="22">{{CARD_2}}</text>
  </g>
  <g id="three-card-three-slot" data-pptx-placeholder="object" data-pptx-idx="3"
    data-pptx-bounds="872 192 320 424">
    <text id="three-card-three-carrier" data-pptx-carrier="true"
      x="872" y="230" fill="#64748B"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="22">{{CARD_3}}</text>
