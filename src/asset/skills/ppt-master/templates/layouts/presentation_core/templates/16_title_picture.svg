<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="presentation_core_master" data-pptx-master-name="Presentation Core"
  data-pptx-layout="title_picture" data-pptx-layout-name="Title and Picture">
  <rect id="master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="title-picture-rule" x="64" y="120" width="96" height="4" rx="2" fill="#CBD5E1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="title-picture-image-panel" x="64" y="152" width="1152" height="504" rx="12"
    fill="#EEF2F6" stroke="#D6DCE3" stroke-width="1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="title-picture-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="64 40 1152 72">
    <text id="title-picture-title-carrier" data-pptx-carrier="true"
      x="64" y="90" fill="#1E293B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="36" font-weight="700">{{PAGE_TITLE}}</text>
  </g>
  <g id="title-picture-picture-slot" data-pptx-placeholder="picture" data-pptx-idx="1"
    data-pptx-bounds="64 152 1152 504">
    <image id="title-picture-picture-carrier" data-pptx-carrier="true"
      x="64" y="152" width="1152" height="504" preserveAspectRatio="none"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="/>
  </g>
</svg>
