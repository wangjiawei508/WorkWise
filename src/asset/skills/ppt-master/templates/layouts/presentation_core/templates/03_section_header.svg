<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="presentation_core_master" data-pptx-master-name="Presentation Core"
  data-pptx-layout="section_header" data-pptx-layout-name="Section Header">
  <rect id="master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="section-header-rail" x="64" y="144" width="8" height="432" rx="4" fill="#CBD5E1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <circle id="section-header-anchor" cx="1128" cy="180" r="72" fill="#F4F6F8"
    stroke="#D6DCE3" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="section-header-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="160 224 896 112">
    <text id="section-header-title-carrier" data-pptx-carrier="true"
      x="160" y="298" fill="#1E293B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="50" font-weight="700">{{CHAPTER_TITLE}}</text>
  </g>
  <g id="section-header-body-slot" data-pptx-placeholder="body" data-pptx-idx="1"
    data-pptx-bounds="160 356 800 92">
    <text id="section-header-body-carrier" data-pptx-carrier="true"
      x="160" y="408" fill="#64748B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="24">{{CHAPTER_DESC}}</text>
  </g>
</svg>
