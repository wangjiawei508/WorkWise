<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="presentation_core_master" data-pptx-master-name="Presentation Core"
  data-pptx-layout="title_content" data-pptx-layout-name="Title and Content">
  <rect id="master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="title-content-rule" x="64" y="120" width="96" height="4" rx="2" fill="#CBD5E1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="title-content-panel" x="64" y="152" width="1152" height="504" rx="12" fill="#F4F6F8"
    stroke="#D6DCE3" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="title-content-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="64 40 1152 72">
    <text id="title-content-title-carrier" data-pptx-carrier="true"
      x="64" y="90" fill="#1E293B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="36" font-weight="700">{{PAGE_TITLE}}</text>
  </g>
  <g id="title-content-object-slot" data-pptx-placeholder="object" data-pptx-idx="1"
    data-pptx-bounds="88 176 1104 456">
    <text id="title-content-object-carrier" data-pptx-carrier="true"
      x="88" y="214" fill="#94A3B8"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="22">{{CONTENT_AREA}}</text>
  </g>
</svg>
