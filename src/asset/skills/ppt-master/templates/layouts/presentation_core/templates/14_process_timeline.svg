    <text id="process-timeline-one-carrier" data-pptx-carrier="true"
      x="196" y="376" text-anchor="middle" fill="#334155"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="22">{{STEP_1}}</text>
  </g>
  <g id="process-timeline-two-slot" data-pptx-placeholder="object" data-pptx-idx="2"
