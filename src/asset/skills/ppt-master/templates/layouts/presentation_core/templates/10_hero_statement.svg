<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="presentation_core_master" data-pptx-master-name="Presentation Core"
  data-pptx-layout="hero_statement" data-pptx-layout-name="Hero Statement">
  <rect id="master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="hero-statement-field" x="64" y="96" width="1152" height="528" rx="20" fill="#F4F6F8"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="hero-statement-accent" x="96" y="144" width="160" height="6" rx="3" fill="#CBD5E1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="hero-statement-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="96 184 1088 208">
    <text id="hero-statement-title-carrier" data-pptx-carrier="true"
      x="96" y="304" fill="#1E293B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="68" font-weight="700">{{KEY_MESSAGE}}</text>
  </g>
  <g id="hero-statement-subtitle-slot" data-pptx-placeholder="subtitle" data-pptx-idx="1"
    data-pptx-bounds="96 424 760 72">
    <text id="hero-statement-subtitle-carrier" data-pptx-carrier="true"
      x="96" y="472" fill="#64748B" font-family="Arial, Microsoft YaHei, sans-serif"
      font-size="26">{{SUBTITLE}}</text>
  </g>
</svg>
