<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="catarc_dark_master" data-pptx-master-name="CATARC Dark"
  data-pptx-layout="cover" data-pptx-layout-name="Cover">
  <rect id="dark-master-background" x="0" y="0" width="1280" height="720" fill="#004098"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="dark-master-top-rule" x="0" y="0" width="1280" height="4" fill="#FFFFFF" fill-opacity="0.35"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="dark-master-bottom-rule" x="0" y="716" width="1280" height="4" fill="#FFFFFF" fill-opacity="0.35"
    data-pptx-layer="master" data-pptx-editable="false"/>

  <image id="cover-logo" x="344" y="92" width="592" height="238"
    href="../images/大型 logo.png" preserveAspectRatio="xMidYMid meet"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <line id="cover-separator" x1="440" y1="542" x2="840" y2="542" stroke="#FFFFFF"
    stroke-width="1" stroke-opacity="0.4" data-pptx-layer="layout" data-pptx-editable="false"/>

  <g id="cover-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="160 356 960 92">
    <text id="cover-title-carrier" data-pptx-carrier="true"
      x="640" y="416" text-anchor="middle" fill="#FFFFFF"
      font-family="Microsoft YaHei, SimHei, Arial, sans-serif"
      font-size="48" font-weight="700">{{TITLE}}</text>
  </g>
  <g id="cover-subtitle-slot" data-pptx-placeholder="subtitle" data-pptx-idx="1"
    data-pptx-bounds="220 452 840 56">
    <text id="cover-subtitle-carrier" data-pptx-carrier="true"
      x="640" y="490" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.86"
      font-family="Microsoft YaHei, Arial, sans-serif" font-size="26">{{SUBTITLE}}</text>
  </g>
  <g id="cover-author-slot" data-pptx-placeholder="body" data-pptx-idx="2"
    data-pptx-bounds="300 560 680 44">
    <text id="cover-author-carrier" data-pptx-carrier="true"
      x="640" y="590" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.9"
      font-family="Microsoft YaHei, Arial, sans-serif" font-size="22">{{AUTHOR}}</text>
  </g>
  <g id="cover-footer-slot" data-pptx-placeholder="footer" data-pptx-idx="3"
    data-pptx-bounds="300 606 680 32">
    <text id="cover-footer-carrier" data-pptx-carrier="true"
      x="640" y="628" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.7"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">{{AUTHOR_EN}}</text>
  </g>
</svg>
