<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="catarc_light_master" data-pptx-master-name="CATARC Light"
  data-pptx-layout="content" data-pptx-layout-name="Title and Content">
  <rect id="light-master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="light-master-top-rule" x="0" y="0" width="1280" height="4" fill="#004098"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="light-master-number-block" x="60" y="30" width="50" height="50" fill="#004098"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <image id="light-master-logo" x="1107" y="30" width="113" height="50"
    href="../images/右上角 logo.png" preserveAspectRatio="xMidYMid meet"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <line id="light-master-header-rule" x1="60" y1="95" x2="1220" y2="95" stroke="#E0E0E0"
    stroke-width="1" data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="light-master-bottom-rule" x="0" y="716" width="1280" height="4" fill="#004098"
    data-pptx-layer="master" data-pptx-editable="false"/>

  <rect id="content-panel" x="60" y="110" width="1160" height="550" rx="10"
    fill="#F8FAFC" stroke="#E0E0E0" stroke-width="1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="content-panel-accent" x="60" y="110" width="6" height="550" fill="#004098"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="content-chapter-slot" data-pptx-placeholder="body" data-pptx-idx="1"
    data-pptx-bounds="60 30 50 50">
    <text id="content-chapter-carrier" data-pptx-carrier="true"
      x="85" y="65" text-anchor="middle" fill="#FFFFFF"
      font-family="Arial, sans-serif" font-size="24" font-weight="700">{{CHAPTER_NUM}}</text>
  </g>
  <g id="content-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="130 32 920 48">
    <text id="content-title-carrier" data-pptx-carrier="true"
      x="130" y="65" fill="#333333"
      font-family="Microsoft YaHei, SimHei, Arial, sans-serif"
      font-size="28" font-weight="700">{{PAGE_TITLE}}</text>
  </g>
  <g id="content-object-slot" data-pptx-placeholder="object" data-pptx-idx="2"
    data-pptx-bounds="88 138 1104 494">
    <text id="content-object-carrier" data-pptx-carrier="true"
      x="88" y="172" fill="#7890A8"
      font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">{{CONTENT_AREA}}</text>
  </g>
  <g id="content-slide-number-slot" data-pptx-placeholder="slide-number"
    data-pptx-idx="3" data-pptx-bounds="1140 682 80 24">
    <text id="content-slide-number-carrier" data-pptx-carrier="true"
      x="1220" y="702" text-anchor="end" fill="#999999"
      font-family="Arial, sans-serif" font-size="14">{{PAGE_NUM}}</text>
  </g>
</svg>
