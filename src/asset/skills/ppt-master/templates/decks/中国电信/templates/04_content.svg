<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="china_telecom_content_master" data-pptx-master-name="China Telecom Content"
  data-pptx-layout="content" data-pptx-layout-name="Title and Content">
  <rect id="content-master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="content-master-red-capsule" x="0" y="32" width="206" height="64" rx="24" fill="#C00000"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="content-master-red-lane" x="114" y="32" width="1166" height="64" fill="#C00000"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="content-master-gray-lane" x="206" y="39" width="1074" height="50" rx="22" fill="#D9D9D9"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <image id="content-master-header-brand" x="1000" y="38" width="208" height="48"
    href="../images/header_brand.png" preserveAspectRatio="xMaxYMid meet"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <line id="content-master-footer-rule" x1="72" y1="650" x2="1208" y2="650" stroke="#D1D5DB"
    stroke-width="1" data-pptx-layer="master" data-pptx-editable="false"/>

  <rect id="content-panel" x="72" y="132" width="1136" height="486" rx="24"
    fill="#F8FAFC" stroke="#D1D5DB" stroke-width="1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="content-panel-accent" x="1078" y="552" width="72" height="4" rx="2" fill="#C00000"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="content-panel-accent-soft" x="1042" y="572" width="132" height="4" rx="2"
    fill="#C00000" fill-opacity="0.24" data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="content-section-slot" data-pptx-placeholder="body" data-pptx-idx="1"
    data-pptx-bounds="40 44 146 40">
    <text id="content-section-carrier" data-pptx-carrier="true"
      x="40" y="72" fill="#FFFFFF"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="22" font-weight="700">{{SECTION_NAME}}</text>
  </g>
  <g id="content-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="228 44 714 40">
    <text id="content-title-carrier" data-pptx-carrier="true"
      x="228" y="72" fill="#2B2F33"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="24" font-weight="700">{{PAGE_TITLE}}</text>
  </g>
  <g id="content-object-slot" data-pptx-placeholder="object" data-pptx-idx="2"
    data-pptx-bounds="96 156 1088 438">
    <text id="content-object-carrier" data-pptx-carrier="true"
      x="96" y="190" fill="#9CA3AF"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="20">{{CONTENT_AREA}}</text>
  </g>
  <g id="content-source-slot" data-pptx-placeholder="footer" data-pptx-idx="3"
    data-pptx-bounds="72 658 720 28">
    <text id="content-source-carrier" data-pptx-carrier="true"
      x="72" y="678" fill="#6B7280"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">{{SOURCE}}</text>
  </g>
  <g id="content-slide-number-slot" data-pptx-placeholder="slide-number"
    data-pptx-idx="4" data-pptx-bounds="1128 658 80 28">
    <text id="content-slide-number-carrier" data-pptx-carrier="true"
      x="1208" y="678" text-anchor="end" fill="#6B7280"
      font-family="Arial, sans-serif" font-size="13">{{PAGE_NUM}}</text>
  </g>
</svg>
