<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="china_telecom_brand_master" data-pptx-master-name="China Telecom Brand"
  data-pptx-layout="cover" data-pptx-layout-name="Cover">
  <rect id="brand-master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="brand-master-top-rule" x="0" y="0" width="1280" height="8" fill="#C00000"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <image id="brand-master-footer-ribbon" x="0" y="554" width="1280" height="166"
    href="../images/footer_ribbon.png" preserveAspectRatio="xMidYMid slice"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <text id="brand-master-footer-label" x="72" y="650" fill="#FFFFFF"
    font-family="Arial, Microsoft YaHei, sans-serif" font-size="14"
    data-pptx-layer="master" data-pptx-editable="false">CHINA TELECOM</text>

  <rect id="cover-title-accent" x="72" y="118" width="6" height="316" rx="3" fill="#C00000"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="cover-logo" x="72" y="34" width="214" height="58" href="../images/logo.png"
    preserveAspectRatio="xMinYMid meet" data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="cover-brand-card" x="820" y="136" width="388" height="318" rx="28"
    fill="#F8FAFC" stroke="#E5E7EB" stroke-width="2"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="cover-brand-card-accent" x="858" y="188" width="110" height="4" rx="2" fill="#C00000"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="cover-slogan" x="862" y="236" width="292" height="102"
    href="../images/slogan_red.png" preserveAspectRatio="xMidYMid meet"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="cover-skyline" x="848" y="350" width="324" height="92"
    href="../images/skyline_bg.png" preserveAspectRatio="xMidYMid meet"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="cover-title-rule" x="108" y="288" width="144" height="6" rx="3" fill="#C00000"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="cover-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="108 148 640 82">
    <text id="cover-title-carrier" data-pptx-carrier="true"
      x="108" y="202" fill="#111827"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="42" font-weight="700">{{TITLE}}</text>
  </g>
  <g id="cover-subtitle-slot" data-pptx-placeholder="subtitle" data-pptx-idx="1"
    data-pptx-bounds="108 226 640 48">
    <text id="cover-subtitle-carrier" data-pptx-carrier="true"
      x="108" y="258" fill="#6B7280"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="21">{{SUBTITLE}}</text>
  </g>
  <g id="cover-author-slot" data-pptx-placeholder="body" data-pptx-idx="2"
    data-pptx-bounds="108 322 560 48">
    <text id="cover-author-carrier" data-pptx-carrier="true"
      x="108" y="354" fill="#2B2F33"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="18">{{AUTHOR}}</text>
  </g>
  <g id="cover-date-slot" data-pptx-placeholder="date" data-pptx-idx="3"
    data-pptx-bounds="108 386 320 38">
    <text id="cover-date-carrier" data-pptx-carrier="true"
      x="108" y="412" fill="#6B7280"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="15">{{DATE}}</text>
  </g>
</svg>
