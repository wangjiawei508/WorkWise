<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  width="1280" height="720" viewBox="0 0 1280 720"
  data-pptx-master="china_telecom_brand_master" data-pptx-master-name="China Telecom Brand"
  data-pptx-layout="closing" data-pptx-layout-name="Closing">
  <rect id="brand-master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <rect id="brand-master-top-rule" x="0" y="0" width="1280" height="8" fill="#C00000"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <image id="brand-master-footer-ribbon" x="0" y="554" width="1280" height="166"
    href="../images/footer_ribbon.png" preserveAspectRatio="xMidYMid slice"
    data-pptx-layer="master" data-pptx-editable="false"/>
  <text id="brand-master-footer-label" x="72" y="650" fill="#FFFFFF"
    font-family="Arial, Microsoft YaHei, sans-serif" font-size="14"
    data-pptx-layer="master" data-pptx-editable="false">CHINA TELECOM</text>

  <image id="closing-logo" x="72" y="34" width="214" height="58" href="../images/logo.png"
    preserveAspectRatio="xMinYMid meet" data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="closing-title-rule" x="96" y="352" width="192" height="6" rx="3" fill="#C00000"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="closing-brand-card" x="838" y="156" width="370" height="286" rx="28"
    fill="#F8FAFC" stroke="#E5E7EB" stroke-width="2"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <rect id="closing-brand-accent" x="874" y="204" width="88" height="4" rx="2" fill="#C00000"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="closing-slogan" x="888" y="242" width="268" height="92"
    href="../images/slogan_red.png" preserveAspectRatio="xMidYMid meet"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="closing-skyline" x="872" y="344" width="304" height="84"
    href="../images/skyline_bg.png" preserveAspectRatio="xMidYMid meet"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <g id="closing-title-slot" data-pptx-placeholder="title"
    data-pptx-bounds="96 226 620 72">
    <text id="closing-title-carrier" data-pptx-carrier="true"
      x="96" y="274" fill="#111827"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="40" font-weight="700">{{THANK_YOU}}</text>
  </g>
  <g id="closing-subtitle-slot" data-pptx-placeholder="subtitle" data-pptx-idx="1"
    data-pptx-bounds="96 300 620 40">
    <text id="closing-subtitle-carrier" data-pptx-carrier="true"
      x="96" y="328" fill="#6B7280"
      font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">{{ENDING_SUBTITLE}}</text>
  </g>
  <g id="closing-contact-slot" data-pptx-placeholder="body" data-pptx-idx="2"
    data-pptx-bounds="96 388 620 64">
    <text id="closing-contact-carrier" data-pptx-carrier="true"
      x="96" y="420" fill="#2B2F33"
      font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif"
      font-size="18">{{CONTACT_INFO}}</text>
  </g>
  <g id="closing-slide-number-slot" data-pptx-placeholder="slide-number"
    data-pptx-idx="3" data-pptx-bounds="1128 658 80 28">
    <text id="closing-slide-number-carrier" data-pptx-carrier="true"
      x="1208" y="678" text-anchor="end" fill="#FFFFFF"
      font-family="Arial, sans-serif" font-size="13">{{PAGE_NUM}}</text>
  </g>
</svg>
