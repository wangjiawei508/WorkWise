<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
     font-size="12">
    <!-- 
    Stacked Area Chart Template
    Purpose: Multi-series cumulative trends and composition changes
    Use cases: Revenue breakdown, traffic sources, market share
    Feature: Mathematically precise stacking, gradient ribbons, 5-card dashboard
    -->
    <!-- Background -->
    <rect width="1280" height="720" fill="#F8FAFC"/>
    <!-- ==================== Header ==================== -->
    <g id="header" data-pptx-bounds="60 30 560 70">
        <text x="60" y="60" font-size="32" font-weight="800" fill="#0F172A">Revenue Composition Trend</text>
        <text x="60" y="90" font-size="14" font-weight="700" fill="#64748B" letter-spacing="1">2025 MONTHLY DATA · UNIT: $M</text>
    </g>
    <!-- ==================== Legend ==================== -->
    <g id="legend" data-pptx-bounds="680 55 500 24" transform="translate(680, 60)"
       font-size="14" font-weight="600" fill="#64748B">
        <rect x="0" y="0" width="12" height="12" rx="3" fill="#6366F1"/>
        <text x="20" y="11">Subscription</text>
        <rect x="130" y="0" width="12" height="12" rx="3" fill="#0EA5E9"/>
        <text x="150" y="11">Advertising</text>
        <rect x="250" y="0" width="12" height="12" rx="3" fill="#10B981"/>
        <text x="270" y="11">Value-Added</text>
        <rect x="380" y="0" width="12" height="12" rx="3" fill="#F59E0B"/>
        <text x="400" y="11">Other</text>
    </g>
    <!-- ==================== Chart Area ==================== -->
    <g id="stacked_area_chart" data-pptx-bounds="60 140 1120 450" data-pptx-replace-with="chart">
        <metadata type="application/json">
            {
              "name": "stacked_area_chart",
              "x": 85,
              "y": 150,
              "width": 1095,
              "height": 433.25,
              "type": "area",
              "grouping": "stacked",
              "categories": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
              "series": [
                {"name": "Subscription", "values": [45, 48, 52, 55, 58, 62, 68, 72, 70, 68, 75, 82]},
                {"name": "Advertising", "values": [25, 28, 30, 32, 35, 38, 42, 45, 43, 40, 45, 50]},
                {"name": "Value-Added", "values": [15, 16, 18, 20, 22, 25, 28, 30, 28, 26, 30, 35]},
                {"name": "Other", "values": [8, 8, 10, 10, 12, 12, 15, 15, 14, 14, 15, 18]}
              ],
              "style": {"colors": ["#6366F1", "#0EA5E9", "#10B981", "#F59E0B"]}
            }
        </metadata>
    <g id="chartArea">
        <!-- Vertical Grid Lines (Months) -->
        <g id="vertical-grid" stroke="#F1F5F9" stroke-width="1.5">
            <line x1="145" y1="160" x2="145" y2="550"/>
            <line x1="235" y1="160" x2="235" y2="550"/>
            <line x1="325" y1="160" x2="325" y2="550"/>
            <line x1="415" y1="160" x2="415" y2="550"/>
            <line x1="505" y1="160" x2="505" y2="550"/>
            <line x1="595" y1="160" x2="595" y2="550"/>
            <line x1="685" y1="160" x2="685" y2="550"/>
            <line x1="775" y1="160" x2="775" y2="550"/>
            <line x1="865" y1="160" x2="865" y2="550"/>
            <line x1="955" y1="160" x2="955" y2="550"/>
            <line x1="1045" y1="160" x2="1045" y2="550"/>
            <line x1="1135" y1="160" x2="1135" y2="550"/>
        </g>
        <!-- Horizontal Grid Lines -->
        <g id="horizontal-grid" stroke="#F1F5F9" stroke-width="1.5">
            <line x1="100" y1="550" x2="1180" y2="550" stroke="#E2E8F0"/>
            <line x1="100" y1="460" x2="1180" y2="460"/>
            <line x1="100" y1="370" x2="1180" y2="370"/>
            <line x1="100" y1="280" x2="1180" y2="280"/>
            <line x1="100" y1="190" x2="1180" y2="190"/>
        </g>
        <!-- Y-Axis Labels -->
        <g id="value-labels" font-size="13" font-weight="600" fill="#64748B" text-anchor="end">
            <text x="85" y="555">0</text>
            <text x="85" y="465">50</text>
            <text x="85" y="375">100</text>
            <text x="85" y="285">150</text>
            <text x="85" y="195">200</text>
        </g>
        <!-- Main Axes Lines -->
        <g id="axes" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round">
            <line x1="100" y1="150" x2="100" y2="550"/>
            <line x1="100" y1="550" x2="1180" y2="550"/>
        </g>
        <!-- X-Axis Labels -->
        <g id="category-labels" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle">
            <text x="145" y="580">Jan</text>
            <text x="235" y="580">Feb</text>
            <text x="325" y="580">Mar</text>
            <text x="415" y="580">Apr</text>
            <text x="505" y="580">May</text>
            <text x="595" y="580">Jun</text>
            <text x="685" y="580">Jul</text>
            <text x="775" y="580">Aug</text>
            <text x="865" y="580">Sep</text>
            <text x="955" y="580">Oct</text>
            <text x="1045" y="580">Nov</text>
            <text x="1135" y="580">Dec</text>
        </g>
        <!-- chart-plot-area: 100,150,1180,550 -->
        <!-- ==================== Stacked Areas ==================== -->
        <!-- Series 4: Other (Amber - Top) -->
        <g id="stacked-areas" fill-opacity="0.68">
        <path d="M 145,550 L 145,382.6 L 235,370 L 325,352 L 415,339.4 L 505,321.4 L 595,303.4 L 685,274.6 L 775,258.4 L 865,271 L 955,283.6 L 1045,253 L 1135,217 L 1135,249.4 L 1045,280 L 955,308.8 L 865,296.2 L 775,285.4 L 685,301.6 L 595,325 L 505,343 L 415,357.4 L 325,370 L 235,384.4 L 145,397 Z" fill="#F59E0B"/>
        <!-- Series 3: Value-Added (Emerald) -->
        <path d="M 145,550 L 145,397 L 235,384.4 L 325,370 L 415,357.4 L 505,343 L 595,325 L 685,301.6 L 775,285.4 L 865,296.2 L 955,308.8 L 1045,280 L 1135,249.4 L 1135,312.4 L 1045,334 L 955,355.6 L 865,346.6 L 775,339.4 L 685,352 L 595,370 L 505,382.6 L 415,393.4 L 325,402.4 L 235,413.2 L 145,424 Z" fill="#10B981"/>
        <!-- Series 2: Advertising (Sky) -->
        <path d="M 145,550 L 145,424 L 235,413.2 L 325,402.4 L 415,393.4 L 505,382.6 L 595,370 L 685,352 L 775,339.4 L 865,346.6 L 955,355.6 L 1045,334 L 1135,312.4 L 1135,402.4 L 1045,415 L 955,427.6 L 865,424 L 775,420.4 L 685,427.6 L 595,438.4 L 505,445.6 L 415,451 L 325,456.4 L 235,463.6 L 145,469 Z" fill="#0EA5E9"/>
        <!-- Series 1: Subscription (Indigo - Bottom) -->
        <path d="M 145,550 L 145,469 L 235,463.6 L 325,456.4 L 415,451 L 505,445.6 L 595,438.4 L 685,427.6 L 775,420.4 L 865,424 L 955,427.6 L 1045,415 L 1135,402.4 L 1135,550 Z" fill="#6366F1"/>
        </g>
        <!-- Top Border Strokes for Definition -->
        <g id="series-borders" fill="none" stroke-width="2">
            <path d="M 145,382.6 L 235,370 L 325,352 L 415,339.4 L 505,321.4 L 595,303.4 L 685,274.6 L 775,258.4 L 865,271 L 955,283.6 L 1045,253 L 1135,217" stroke="#F59E0B"/>
            <path d="M 145,397 L 235,384.4 L 325,370 L 415,357.4 L 505,343 L 595,325 L 685,301.6 L 775,285.4 L 865,296.2 L 955,308.8 L 1045,280 L 1135,249.4" stroke="#10B981"/>
            <path d="M 145,424 L 235,413.2 L 325,402.4 L 415,393.4 L 505,382.6 L 595,370 L 685,352 L 775,339.4 L 865,346.6 L 955,355.6 L 1045,334 L 1135,312.4" stroke="#0EA5E9"/>
            <path d="M 145,469 L 235,463.6 L 325,456.4 L 415,451 L 505,445.6 L 595,438.4 L 685,427.6 L 775,420.4 L 865,424 L 955,427.6 L 1045,415 L 1135,402.4" stroke="#6366F1"/>
        </g>
    </g>
    </g>
    <!-- ==================== Annotation (December Peak) ==================== -->
    <g id="annotation" data-pptx-bounds="1030 140 105 78">
        <rect x="1030" y="140" width="100" height="55" rx="8" fill="#1E293B"/>
        <text x="1080" y="162" font-weight="700" fill="#94A3B8" text-anchor="middle">Peak Month</text>
        <text x="1080" y="182" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">185M</text>
        <path d="M 1075,195 L 1085,195 L 1080,202 Z" fill="#1E293B"/>
        <line x1="1080" y1="202" x2="1135" y2="215" stroke="#1E293B" stroke-width="2" stroke-dasharray="2,2"/>
    </g>
    <!-- ==================== Statistics Dashboard Cards ==================== -->
    <g id="statsCards" data-pptx-bounds="60 610 1160 80">
        <!-- Card 1: Subscription -->
        <rect x="60" y="610" width="216" height="80" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
        <circle cx="85" cy="635" r="5" fill="#6366F1"/>
        <text x="100" y="640" font-size="14" font-weight="700" fill="#3730A3">Subscription</text>
        <text x="85" y="670" font-size="24" font-weight="800" fill="#312E81">755M</text>
        <rect x="190" y="652" width="75" height="22" rx="11" fill="#E0E7FF"/>
        <text x="227.5" y="667" font-weight="800" fill="#4338CA" text-anchor="middle">48.5%</text>
        <!-- Card 2: Advertising -->
        <rect x="296" y="610" width="216" height="80" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5"/>
        <circle cx="321" cy="635" r="5" fill="#0EA5E9"/>
        <text x="336" y="640" font-size="14" font-weight="700" fill="#0369A1">Advertising</text>
        <text x="321" y="670" font-size="24" font-weight="800" fill="#0C4A6E">453M</text>
        <rect x="426" y="652" width="75" height="22" rx="11" fill="#E0F2FE"/>
        <text x="463.5" y="667" font-weight="800" fill="#0284C7" text-anchor="middle">29.1%</text>
        <!-- Card 3: Value-Added -->
        <rect x="532" y="610" width="216" height="80" rx="10" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
        <circle cx="557" cy="635" r="5" fill="#10B981"/>
        <text x="572" y="640" font-size="14" font-weight="700" fill="#047857">Value-Added</text>
        <text x="557" y="670" font-size="24" font-weight="800" fill="#064E3B">293M</text>
        <rect x="662" y="652" width="75" height="22" rx="11" fill="#D1FAE5"/>
        <text x="699.5" y="667" font-weight="800" fill="#059669" text-anchor="middle">18.8%</text>
        <!-- Card 4: Other -->
        <rect x="768" y="610" width="216" height="80" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
        <circle cx="793" cy="635" r="5" fill="#F59E0B"/>
        <text x="808" y="640" font-size="14" font-weight="700" fill="#B45309">Other</text>
        <text x="793" y="670" font-size="24" font-weight="800" fill="#78350F">56M</text>
        <rect x="898" y="652" width="75" height="22" rx="11" fill="#FEF3C7"/>
        <text x="935.5" y="667" font-weight="800" fill="#D97706" text-anchor="middle">3.6%</text>
        <!-- Card 5: Total Revenue -->
        <rect x="1004" y="610" width="216" height="80" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
        <circle cx="1029" cy="635" r="5" fill="#64748B"/>
        <text x="1044" y="640" font-size="14" font-weight="700" fill="#334155">Total Revenue</text>
        <text x="1029" y="670" font-size="24" font-weight="800" fill="#0F172A">1,557M</text>
        <rect x="1134" y="652" width="75" height="22" rx="11" fill="#D1FAE5"/>
        <text x="1171.5" y="667" font-weight="800" fill="#059669" text-anchor="middle">+11.2%</text>
    </g>
    <!-- ==================== Footer ==================== -->
    <g id="source" data-pptx-bounds="940 690 280 20">
        <text x="1220" y="705" font-size="13" font-weight="600" fill="#94A3B8" text-anchor="end">Data Source: Finance Department</text>
    </g>
</svg>
