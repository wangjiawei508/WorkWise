    <!-- ==================== Footer Info ==================== -->
    <g id="summary" data-pptx-bounds="342 545 596 60">
        <text x="640" y="580" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">
            Total Headcount: 96 | Management: 6 | Departments: 10
        </text>
    </g>
    <g id="source" data-pptx-bounds="40 666 1200 39">
        <text x="60" y="690" font-size="13" font-weight="500" fill="#94A3B8">
            Updated: Dec 2025
        </text>
