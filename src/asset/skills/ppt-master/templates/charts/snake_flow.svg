<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
     font-size="12">
    <!--
    Snake Flow Diagram Template
    Purpose: Long sequential journey winding across multiple rows
    Use cases: Multi-year roadmap, lifecycle, multi-stage workflow, 6-10 milestone timeline
    Structure: Three-row serpentine with a 4-2-4 node distribution
    Encoding: Ordered node colors, dual-ring milestones, and matching card bands
    -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- ==================== Header ==================== -->
    <g id="header" data-pptx-bounds="260 28 760 68">
        <text x="640" y="58" text-anchor="middle" font-size="32" font-weight="800" fill="#0F172A"><tspan>Ten-Year Strategic Roadmap</tspan></text>
        <text x="640" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#64748B" letter-spacing="1.5"><tspan>DECADE JOURNEY · TEN MILESTONES · THREE-ROW SERPENTINE</tspan></text>
    </g>

    <!-- ==================== Continuous Ribbon Path (3-row S, 4-2-4 layout) ==================== -->
    <!-- Top row y=200 (x=200..1020), right U-turn r=100, mid row y=400 (R->L), left U-turn r=90, bottom row y=580 -->
    <g id="ribbon-track" data-pptx-bounds="95 187 1040 406">
        <!-- Heavy ribbon base + thin inner rail preserve the winding reading path. -->
        <path d="M 200 200 H 1020 A 100 100 0 0 1 1020 400 H 200 A 90 90 0 0 0 200 580 H 1020"
              fill="none" stroke="#E0E7FF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 200 200 H 1020 A 100 100 0 0 1 1020 400 H 200 A 90 90 0 0 0 200 580 H 1020"
              fill="none" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.35"/>
    </g>

    <!-- ==================== Milestone Cards ==================== -->
    <g id="milestone-cards" data-pptx-bounds="80 110 1060 570">
    <!-- Top row cards: ABOVE the row (between title and nodes) -->
    <g id="card-01">
        <rect x="80" y="110" width="240" height="62" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
        <rect x="80" y="110" width="240" height="5" fill="#6366F1"/>
        <text x="200" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A"><tspan>Milestone Title</tspan></text>
        <text x="200" y="160" text-anchor="middle" fill="#475569"><tspan>Concise description of scope.</tspan></text>
    </g>
    <g id="card-02">
