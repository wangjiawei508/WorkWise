<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-size="12">
    <!--
    Pyramid Capability Chart Template
    Purpose: Hierarchical structure, capability maturity, strategic layers
    Use cases: Maslow's hierarchy, Enterprise strategy layers, Maturity models
    Supports: 5 precise geometric layers
    -->
    <!-- Background -->
    <rect width="1280" height="720" fill="#F8FAFC"/>
    <!-- ==================== Header Area ==================== -->
    <g id="header" data-pptx-bounds="40 15 1200 125">
        <text x="60" y="70" font-size="32" font-weight="800" fill="#0F172A">Strategic Capability Pyramid</text>
        <text x="60" y="100" font-size="14" font-weight="700" fill="#64748B" letter-spacing="1">FIVE-TIER EVOLUTION MODEL · FROM FOUNDATION TO VISION</text>
    </g>
    <!-- Translate group to perfectly center vertically -->
    <g id="pyramid-stack" data-pptx-bounds="14 146 1266 498" transform="translate(0, 35)">
        <!-- ==================== Connecting Lines ==================== -->
        <g>
            <line x1="393" y1="195" x2="680" y2="195" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" stroke-opacity="0.8"/>
            <line x1="438" y1="270" x2="680" y2="270" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" stroke-opacity="0.8"/>
            <line x1="492" y1="360" x2="680" y2="360" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" stroke-opacity="0.8"/>
            <line x1="546" y1="450" x2="680" y2="450" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" stroke-opacity="0.8"/>
            <line x1="600" y1="540" x2="680" y2="540" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 4" stroke-opacity="0.8"/>
        </g>
        <!-- ==================== Pyramid Object ==================== -->
        <g>
            <!-- L1 (Base) -->
            <g id="pyramid-level-1" data-pptx-authoring="preset" data-pptx-object="shape" data-pptx-prst="trapezoid" data-pptx-frame="96 500 528 80" data-pptx-av-adj="val 60000" fill="#06B6D4" stroke="none">
                <path d="M 96 580 L 144 500 L 576 500 L 624 580 Z"/>
            </g>
            <!-- L2 -->
            <g id="pyramid-level-2" data-pptx-authoring="preset" data-pptx-object="shape" data-pptx-prst="trapezoid" data-pptx-frame="150 410 420 80" data-pptx-av-adj="val 60000" fill="#0EA5E9" stroke="none">
                <path d="M 150 490 L 198 410 L 522 410 L 570 490 Z"/>
            </g>
            <!-- L3 -->
            <g id="pyramid-level-3" data-pptx-authoring="preset" data-pptx-object="shape" data-pptx-prst="trapezoid" data-pptx-frame="204 320 312 80" data-pptx-av-adj="val 60000" fill="#3B82F6" stroke="none">
                <path d="M 204 400 L 252 320 L 468 320 L 516 400 Z"/>
            </g>
            <!-- L4 -->
            <g id="pyramid-level-4" data-pptx-authoring="preset" data-pptx-object="shape" data-pptx-prst="trapezoid" data-pptx-frame="258 230 204 80" data-pptx-av-adj="val 60000" fill="#6366F1" stroke="none">
                <path d="M 258 310 L 306 230 L 414 230 L 462 310 Z"/>
            </g>
            <!-- L5 (Top) -->
            <g id="pyramid-level-5" data-pptx-authoring="preset" data-pptx-object="shape" data-pptx-prst="triangle" data-pptx-frame="312 140 96 80" fill="#7C3AED" stroke="none">
                <path d="M 312 220 L 360 140 L 408 220 Z"/>
            </g>
        </g>
        <!-- Connection Anchor Dots -->
        <g>
            <circle cx="393" cy="195" r="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2.5"/>
            <circle cx="438" cy="270" r="4" fill="#FFFFFF" stroke="#6366F1" stroke-width="2.5"/>
            <circle cx="492" cy="360" r="4" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2.5"/>
            <circle cx="546" cy="450" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2.5"/>
            <circle cx="600" cy="540" r="4" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2.5"/>
        </g>
        <!-- Pyramid Text Labels -->
        <g>
            <text x="360" y="200" text-anchor="middle" font-size="14" font-weight="800" fill="#FFFFFF" letter-spacing="1">VISION</text>
            <text x="360" y="276" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="1">INNOVATION</text>
            <text x="360" y="366" text-anchor="middle" font-size="16" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">BRAND POWER</text>
            <text x="360" y="456" text-anchor="middle" font-size="17" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">R&amp;D SYSTEM</text>
            <text x="360" y="546" text-anchor="middle" font-size="18" font-weight="800" fill="#FFFFFF" letter-spacing="2">OPERATIONS</text>
        </g>
        <!-- ==================== Explanatory Cards ==================== -->
        <!-- L5 Card -->
        <g transform="translate(680, 155)">
            <rect x="0" y="0" width="540" height="80" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
            <line x1="6" y1="20" x2="6" y2="60" stroke="#7C3AED" stroke-width="6" stroke-linecap="round"/>
            <text x="25" y="32" font-size="16" font-weight="800" fill="#0F172A">Vision &amp; Purpose</text>
            <text x="25" y="56" font-size="14" font-weight="500" fill="#475569">Establishes industry leadership and guides overall strategic layout.</text>
            <rect x="480" y="20" width="40" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
            <text x="500" y="46" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="middle">L5</text>
        </g>
        <!-- L4 Card -->
        <g transform="translate(680, 230)">
            <rect x="0" y="0" width="540" height="80" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
            <line x1="6" y1="20" x2="6" y2="60" stroke="#6366F1" stroke-width="6" stroke-linecap="round"/>
            <text x="25" y="32" font-size="16" font-weight="800" fill="#0F172A">Innovation Drive</text>
            <text x="25" y="56" font-size="14" font-weight="500" fill="#475569">Builds continuous innovation mechanisms and explores frontiers.</text>
            <rect x="480" y="20" width="40" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
            <text x="500" y="46" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="middle">L4</text>
        </g>
        <!-- L3 Card -->
        <g transform="translate(680, 320)">
            <rect x="0" y="0" width="540" height="80" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
            <line x1="6" y1="20" x2="6" y2="60" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
            <text x="25" y="32" font-size="16" font-weight="800" fill="#0F172A">Brand Influence</text>
            <text x="25" y="56" font-size="14" font-weight="500" fill="#475569">Creates industry-leading awareness and deep customer loyalty.</text>
            <rect x="480" y="20" width="40" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
            <text x="500" y="46" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="middle">L3</text>
        </g>
        <!-- L2 Card -->
        <g transform="translate(680, 410)">
            <rect x="0" y="0" width="540" height="80" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
            <line x1="6" y1="20" x2="6" y2="60" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round"/>
            <text x="25" y="32" font-size="16" font-weight="800" fill="#0F172A">R&amp;D Capabilities</text>
            <text x="25" y="56" font-size="14" font-weight="500" fill="#475569">Supported by 500+ core patents and deep technical expertise.</text>
            <rect x="480" y="20" width="40" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
            <text x="500" y="46" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="middle">L2</text>
        </g>
        <!-- L1 Card -->
        <g transform="translate(680, 500)">
            <rect x="0" y="0" width="540" height="80" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
            <line x1="6" y1="20" x2="6" y2="60" stroke="#06B6D4" stroke-width="6" stroke-linecap="round"/>
            <text x="25" y="32" font-size="16" font-weight="800" fill="#0F172A">Operational Foundation</text>
            <text x="25" y="56" font-size="14" font-weight="500" fill="#475569">Refined operations, global supply chain, and intelligent logistics.</text>
            <rect x="480" y="20" width="40" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
            <text x="500" y="46" font-size="14" font-weight="800" fill="#94A3B8" text-anchor="middle">L1</text>
        </g>
    </g>
    <!-- ==================== Footer ==================== -->
    <g id="source" data-pptx-bounds="40 656 1200 39">
        <text x="60" y="680" font-size="13" font-weight="600" fill="#94A3B8">Higher tiers represent greater strategic value, while lower tiers provide essential structural support.</text>
    </g>
</svg>
