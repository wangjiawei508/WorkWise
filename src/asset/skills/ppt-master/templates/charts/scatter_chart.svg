        <circle cx="498" cy="404" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="552" cy="392" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="615" cy="368" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="660" cy="340" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="732" cy="328" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="795" cy="296" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="858" cy="284" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="912" cy="252" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="975" cy="232" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <!-- Offline Series Data Points (Rose) -->
        <circle cx="228" cy="476" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="282" cy="460" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="345" cy="448" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="390" cy="444" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="462" cy="424" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="525" cy="412" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="588" cy="396" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="642" cy="388" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="705" cy="372" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="768" cy="356" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="822" cy="340" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="885" cy="328" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="948" cy="312" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="1002" cy="308" r="7" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
    </g>
    </g>
    <!-- ==================== Right Dashboard Panel ==================== -->
    <g id="dashboardPanel" data-pptx-bounds="1060 160 180 400">
        <!-- Dashboard Base -->
        <rect x="1060" y="160" width="180" height="400" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
        <!-- Header -->
        <text x="1150" y="195" font-size="14" font-weight="800" fill="#0F172A" text-anchor="middle">Statistical Summary</text>
        <line x1="1060" y1="210" x2="1240" y2="210" stroke="#F1F5F9" stroke-width="1.5"/>
        <!-- Online Series Legend & Stats -->
        <rect x="1080" y="225" width="12" height="12" rx="3" fill="#4F46E5"/>
        <text x="1100" y="236" font-size="14" font-weight="700" fill="#1E293B">Online</text>
        <text x="1080" y="260" font-weight="600" fill="#64748B">R² Score</text>
        <text x="1220" y="260" font-size="13" font-weight="800" fill="#0F172A" text-anchor="end">0.94</text>
        <text x="1080" y="280" font-weight="600" fill="#64748B">ROI Slope</text>
        <text x="1220" y="280" font-size="13" font-weight="800" fill="#4F46E5" text-anchor="end">6.8x</text>
        <!-- Separator -->
        <line x1="1080" y1="298" x2="1220" y2="298" stroke="#F1F5F9" stroke-width="1"/>
        <!-- Offline Series Legend & Stats -->
        <rect x="1080" y="315" width="12" height="12" rx="3" fill="#E11D48"/>
        <text x="1100" y="326" font-size="14" font-weight="700" fill="#1E293B">Offline</text>
        <text x="1080" y="350" font-weight="600" fill="#64748B">R² Score</text>
        <text x="1220" y="350" font-size="13" font-weight="800" fill="#0F172A" text-anchor="end">0.88</text>
        <text x="1080" y="370" font-weight="600" fill="#64748B">ROI Slope</text>
        <text x="1220" y="370" font-size="13" font-weight="800" fill="#E11D48" text-anchor="end">5.2x</text>
        <!-- AI Insight Box -->
        <rect x="1070" y="405" width="160" height="140" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
        <text x="1090" y="430" font-size="13" font-weight="800" fill="#4338CA">💡 AI Insight</text>
        <text x="1090" y="455" font-weight="600" fill="#3730A3">Online ROI<tspan x="1090" dy="20">outperforms offline</tspan><tspan x="1090" dy="20" font-weight="800" fill="#312E81">by 31%.</tspan></text>
        <text x="1090" y="520" font-weight="700" fill="#4338CA">Recommendation:</text>
        <text x="1150" y="538" font-weight="800" fill="#312E81" text-anchor="middle">SCALE ONLINE SPEND</text>
    </g>
    <!-- ==================== Footer ==================== -->
    <g id="source" data-pptx-bounds="60 670 360 25">
        <text x="60" y="690" font-size="13" font-weight="600" fill="#94A3B8">Data Source: Marketing Analytics Department</text>
    </g>
</svg>
