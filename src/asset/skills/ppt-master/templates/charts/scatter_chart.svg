<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-size="12">
    <!-- 
    Scatter Chart Template
    Purpose: Correlation analysis, data distribution
    Use cases: Ad spend vs Revenue, Height vs Weight, Investment vs Return
    Feature: Linear regression lines, confidence intervals, AI insights panel
    -->
    <!-- Background -->
    <rect width="1280" height="720" fill="#F8FAFC"/>
    <!-- ==================== Header ==================== -->
    <g id="header" data-pptx-bounds="60 35 720 75">
        <text x="60" y="70" font-size="32" font-weight="800" fill="#0F172A">Ad Spend vs. Sales Revenue Correlation</text>
        <text x="60" y="100" font-size="14" font-weight="700" fill="#64748B" letter-spacing="1">2025 REGIONAL DATA · SAMPLE SIZE N=28</text>
    </g>
    <!-- ==================== Chart Area ==================== -->
    <g id="scatter_chart" data-pptx-bounds="30 151 1013.1 480" data-pptx-replace-with="chart">
        <metadata type="application/json">
            {
              "name": "scatter_chart",
              "x": 30,
              "y": 151,
              "width": 1013.1,
              "height": 477.75,
              "type": "scatter",
              "scatter_style": "marker",
              "series": [
                {
                  "name": "Online",
                  "x": [10, 15, 22, 28, 35, 42, 48, 55, 60, 68, 75, 82, 88, 95],
                  "y": [130, 160, 240, 270, 340, 390, 420, 480, 550, 580, 660, 690, 770, 820]
                },
                {
                  "name": "Offline",
                  "x": [12, 18, 25, 30, 38, 45, 52, 58, 65, 72, 78, 85, 92, 98],
                  "y": [210, 250, 280, 290, 340, 370, 410, 430, 470, 510, 550, 580, 620, 630]
                }
              ],
              "style": {"colors": ["#4F46E5", "#E11D48"]}
            }
        </metadata>
    <g id="chartArea">
        <!-- Horizontal Grid Lines -->
        <line x1="120" y1="560" x2="1020" y2="560" stroke="#E2E8F0" stroke-width="1.5"/>
        <line x1="120" y1="480" x2="1020" y2="480" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="120" y1="400" x2="1020" y2="400" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="120" y1="320" x2="1020" y2="320" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="120" y1="240" x2="1020" y2="240" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="120" y1="160" x2="1020" y2="160" stroke="#F1F5F9" stroke-width="1.5"/>
        <!-- Vertical Grid Lines -->
        <line x1="120" y1="160" x2="120" y2="560" stroke="#E2E8F0" stroke-width="1.5"/>
        <line x1="300" y1="160" x2="300" y2="560" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="480" y1="160" x2="480" y2="560" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="660" y1="160" x2="660" y2="560" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="840" y1="160" x2="840" y2="560" stroke="#F1F5F9" stroke-width="1.5"/>
        <line x1="1020" y1="160" x2="1020" y2="560" stroke="#F1F5F9" stroke-width="1.5"/>
        <!-- Y-Axis Labels -->
        <text x="105" y="565" font-size="14" font-weight="600" fill="#64748B" text-anchor="end">0</text>
        <text x="105" y="485" font-size="14" font-weight="600" fill="#64748B" text-anchor="end">200</text>
        <text x="105" y="405" font-size="14" font-weight="600" fill="#64748B" text-anchor="end">400</text>
        <text x="105" y="325" font-size="14" font-weight="600" fill="#64748B" text-anchor="end">600</text>
        <text x="105" y="245" font-size="14" font-weight="600" fill="#64748B" text-anchor="end">800</text>
        <text x="105" y="165" font-size="14" font-weight="600" fill="#64748B" text-anchor="end">1,000</text>
        <!-- Y-Axis Title -->
        <text x="45" y="360" font-size="15" font-weight="700" fill="#475569" text-anchor="middle" transform="rotate(-90, 45, 360)">Sales Revenue ($K)</text>
        <!-- X-Axis Labels -->
        <text x="120" y="585" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">0</text>
        <text x="300" y="585" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">20</text>
        <text x="480" y="585" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">40</text>
        <text x="660" y="585" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">60</text>
        <text x="840" y="585" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">80</text>
        <text x="1020" y="585" font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">100</text>
        <!-- X-Axis Title -->
        <text x="570" y="625" font-size="15" font-weight="700" fill="#475569" text-anchor="middle">Ad Spend ($K)</text>
        <!-- Main Axes Lines -->
        <line x1="120" y1="160" x2="120" y2="560" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="120" y1="560" x2="1020" y2="560" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
        <!-- chart-plot-area: 120,160,1020,560 -->
        <!-- Confidence Interval Areas -->
        <polygon points="210,483 975,207 975,257 210,533" fill="#4F46E5" fill-opacity="0.08"/>
        <polygon points="228,456 1002,288 1002,328 228,496" fill="#E11D48" fill-opacity="0.08"/>
        <!-- Linear Regression Trend Lines -->
        <line x1="210" y1="508" x2="975" y2="232" stroke="#4F46E5" stroke-width="3" stroke-dasharray="6,4"/>
        <line x1="228" y1="476" x2="1002" y2="308" stroke="#E11D48" stroke-width="3" stroke-dasharray="6,4"/>
        <!-- Online Series Data Points (Indigo) -->
        <circle cx="210" cy="508" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="255" cy="496" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="318" cy="464" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
        <circle cx="372" cy="452" r="7" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.5"/>
